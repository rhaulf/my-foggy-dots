general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = $HOME/Pictures/Wallpapers/default.jpg   # Imaginea ta specificată
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2 # 0 pentru claritate, 1-3 pentru efect de blurring
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# CEAS (Ora)
label {
    monitor =
    text = $TIME
    color = rgba(238, 238, 238, 1.0)
    font_size = 120
    font_family = Fira Code Bold
    position = 0, 80
    halign = center
    valign = center
}

# INPUT FIELD (Parola)
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(98, 114, 164, 1.0) # Albastru/Mov din tema ta
    inner_color = rgba(28, 31, 36, 1.0)   # Fundalul gri închis (#1c1f24)
    font_color = rgba(238, 238, 238, 1.0)
    fade_on_empty = true
    placeholder_text = <i>Unlock...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# USER (Numele tău)
label {
    monitor =
    text = Hi, $USER
    color = rgba(238, 238, 238, 1.0)
    font_size = 25
    font_family = Fira Code
    position = 0, -40
    halign = center
    valign = center
}
